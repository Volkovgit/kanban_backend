openapi: 3.0.0
info:
  title: Kanban Board API - Boards
  version: 1.0.0
  description: Endpoints для управления канбан-досками

servers:
  - url: http://localhost:3000/api/v1
    description: Development server

paths:
  /boards:
    get:
      tags: [Boards]
      summary: Получить список досок
      description: Возвращает все доски авторизованного пользователя
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [createdAt, updatedAt, title]
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
      responses:
        '200':
          description: Список досок
          headers:
            X-Total-Count:
              schema:
                type: integer
            X-Page-Size:
              schema:
                type: integer
            X-Current-Page:
              schema:
                type: integer
            X-Total-Pages:
              schema:
                type: integer
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Board'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Превышен лимит досок (100 на пользователя)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Boards]
      summary: Создать доску
      description: Создаёт новую доску для авторизованного пользователя
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: My Kanban Board
                description:
                  type: string
                  maxLength: 5000
                  nullable: true
                  example: Project board for tracking tasks
      responses:
        '201':
          description: Доска создана
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Board'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /boards/{id}:
    get:
      tags: [Boards]
      summary: Получить доску по ID
      description: Возвращает доску если она принадлежит авторизованному пользователю
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Доска найдена
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Board'
        '401':
          description: Не авторизован
        '403':
          description: Доска принадлежит другому пользователю
        '404':
          description: Доска не найдена

    patch:
      tags: [Boards]
      summary: Обновить доску
      description: Обновляет название и/или описание доски
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                description:
                  type: string
                  maxLength: 5000
                  nullable: true
      responses:
        '200':
          description: Доска обновлена
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Board'
        '400':
          description: Ошибка валидации
        '401':
          description: Не авторизован
        '403':
          description: Доска принадлежит другому пользователю
        '404':
          description: Доска не найдена

    delete:
      tags: [Boards]
      summary: Удалить доску
      description: Удаляет доску и все связанные задачи (cascade delete)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Доска удалена
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        '401':
          description: Не авторизован
        '403':
          description: Доска принадлежит другому пользователю
        '404':
          description: Доска не найдена

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Board:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
